<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FrameWork</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <header>
        <h1>FrameWork Preview</h1>
    </header>

<div class="hud">
    <div class="hud-title">MemeHub</div>

    <div class="hud-actions">
<button class="hud-btn">
    <i class="fa-solid fa-upload"></i> Upload
</button>

<button class="hud-btn" id="loginBtn">
    <i class="fa-solid fa-right-to-bracket"></i> Login
</button>

    </div>

    <div class="user-panel">
        <div class="user-avatar"></div>
        <div class="user-name">Adrian</div>
    </div>
</div>

<!-- GALERIA (já tem) -->

<div class="toolbar">
<div class="tool-btn"><i class="fa-solid fa-plus"></i></div>
<div class="tool-btn"><i class="fa-solid fa-fire"></i></div>
<div class="tool-btn"><i class="fa-solid fa-gear"></i></div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-close" onclick="closeModal()">✖</div>

    <div class="modal-box">
        <img id="modalImg" src="">
        <div class="modal-content">
            <h3 id="modalTitle"></h3>
            <p id="modalDesc"></p>
        </div>
    </div>
</div>

    <main class="meme-gallery">
        <img src="./image/Skel.jpg" alt="Esqueleto de Guerra meme" class="meme-Card" onclick="openModal('./image/Skel.jpg','Mod Menu','Using reverse engineering with source code.')" >
        <img src="./image/gato-do-cafe.jpg" alt="Gato Do Café meme" class="meme-Card" onclick="openModal('./image/gato-do-cafe.jpg','Working...','Call me if it s urgent.')">
        <img src="./image/Adn-Neon.png" alt="Logo" class="meme-Card" onclick="openModal('./image/Adn-Neon.png','...','fn(...)')">
    </main>
<script>
document.getElementById("loginBtn").addEventListener("click", () => {
    window.location.href = "login.html";
});
</script>
    <!-- JS -->
    <script src="./js/script.js"></script>
</body>
</html>
